# HBCE — Hybrid Controls Editor
# .github/workflows/build.yml
#
# HOW IT WORKS:
#   Every time you push a tag like v0.0.1 to GitHub, this workflow:
#     1. Spins up a free Windows GitHub runner
#     2. Installs Python + all dependencies
#     3. Runs PyInstaller to build HBCE.exe
#     4. Zips the output folder
#     5. Creates a GitHub Release automatically
#     6. Attaches HBCE-v0.0.1-windows.zip to the release
#     7. You download the zip, extract, run HBCE.exe — done.
#
# HOW TO TRIGGER A BUILD:
#   git tag v0.0.1
#   git push origin v0.0.1
#
#   That's it. GitHub does the rest. No build machine needed.
#   Check progress at: https://github.com/Munchi-z/HBC-Editor/actions
#
# TO ALSO BUILD ON EVERY PUSH (dev snapshots):
#   Uncomment the `push: branches: [main]` section below.
#   Dev builds will appear under Actions > Artifacts (not as a Release).

name: Build HBCE Windows Executable

on:
  # ── Release builds — triggered by a version tag ───────────────────────────
  push:
    tags:
      - 'v*.*.*'       # matches v0.0.1, v1.2.3, etc.

  # ── Dev snapshot builds — uncomment to build on every main push ───────────
  # push:
  #   branches: [main]

  # ── Manual trigger — run a build any time from the GitHub Actions UI ──────
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version label for this build (e.g. v0.0.1-beta)'
        required: false
        default: 'manual-build'

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest    # Free GitHub-hosted Windows runner

    steps:

      # ── 1. Check out your repo ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Full history needed for version detection

      # ── 2. Set up Python 3.11 (64-bit) ───────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'         # Cache pip deps between runs (faster builds)

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      # ── 4. Determine version string ───────────────────────────────────────
      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event.inputs.version_override }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # ── 5. Create placeholder assets (if not yet in repo) ─────────────────
      #    Prevents PyInstaller from failing on missing icon file
      - name: Ensure assets exist
        shell: python
        run: |
          import os, struct, zlib

          os.makedirs("assets/icons", exist_ok=True)
          os.makedirs("assets/themes", exist_ok=True)

          # Create a minimal valid .ico file (16x16 transparent) if missing
          ico_path = "assets/icons/hbce_icon.ico"
          if not os.path.exists(ico_path):
              # Minimal ICO: 1 image, 16x16, 32-bit BGRA
              # ICO header
              ico  = b'\x00\x00'   # reserved
              ico += b'\x01\x00'   # type: ICO
              ico += b'\x01\x00'   # count: 1 image
              # Image directory entry
              ico += bytes([16, 16, 0, 0, 1, 0, 32, 0])  # w,h,colors,reserved,planes,bpp
              ico += struct.pack('<I', 40 + 16*16*4)       # size of image data
              ico += struct.pack('<I', 22)                  # offset to image data
              # BITMAPINFOHEADER
              ico += struct.pack('<IIIHHIIIIII',
                                 40, 16, 32, 1, 32, 0,
                                 16*16*4, 0, 0, 0, 0)
              # Pixel data (transparent black, 16x16 BGRA)
              ico += b'\x00\x00\x00\x00' * (16 * 16)
              with open(ico_path, 'wb') as f:
                  f.write(ico)
              print(f"Created placeholder icon: {ico_path}")

          # Minimal QSS theme files
          for theme in ["dark_default.qss", "light_default.qss"]:
              p = f"assets/themes/{theme}"
              if not os.path.exists(p):
                  with open(p, 'w') as f:
                      f.write("/* HBCE theme placeholder */\n")

      # ── 6. Build the .exe with PyInstaller ───────────────────────────────
      - name: Build with PyInstaller
        run: |
          pyinstaller hbce.spec --clean --noconfirm
        env:
          HBCE_DEV_MODE: "1"   # Ensure license check is bypassed in builds

      # ── 7. Verify the build output exists ────────────────────────────────
      - name: Verify build output
        shell: bash
        run: |
          if [ -f "dist/HBCE/HBCE.exe" ]; then
            echo "Build successful: dist/HBCE/HBCE.exe"
            ls -lh dist/HBCE/HBCE.exe
          else
            echo "ERROR: HBCE.exe not found in dist/HBCE/"
            ls -la dist/ || echo "dist/ does not exist"
            exit 1
          fi

      # ── 8. Write version info into build folder ───────────────────────────
      - name: Write build info
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > dist/HBCE/BUILD_INFO.txt << EOF
          HBCE — Hybrid Controls Editor
          Version: $VERSION
          Build date: $(date -u +"%Y-%m-%d %H:%M UTC")
          Commit: ${{ github.sha }}
          Built by: GitHub Actions (windows-latest)
          Repo: https://github.com/Munchi-z/HBC-Editor
          EOF

      # ── 9. Create README for the zip ─────────────────────────────────────
      - name: Write zip README
        shell: bash
        run: |
          cat > dist/HBCE/HOW_TO_RUN.txt << EOF
          HBCE — Hybrid Controls Editor ${{ steps.version.outputs.VERSION }}
          ============================================================

          HOW TO INSTALL:
            1. Extract this entire folder anywhere on your computer
               (Desktop, C:\Program Files\HBCE, a USB drive — anywhere)
            2. Double-click HBCE.exe to launch
            3. No installation required. No admin rights required.

          REQUIREMENTS:
            Windows 10 or Windows 11 (64-bit)
            No Python installation needed — everything is bundled.

          FIRST LAUNCH:
            You will be prompted to set a password for the admin account.
            Default username: admin

          SUPPORT:
            GitHub: https://github.com/Munchi-z/HBC-Editor
          EOF

      # ── 10. Zip the dist folder ───────────────────────────────────────────
      - name: Zip build output
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zipName = "HBCE-$version-windows.zip"
          Compress-Archive -Path "dist\HBCE\*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"
          $size = (Get-Item $zipName).Length / 1MB
          Write-Host ("Zip size: {0:N1} MB" -f $size)
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
        id: zip

      # ── 11. Upload as artifact (available for ALL builds) ─────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HBCE-${{ steps.version.outputs.VERSION }}-windows
          path: HBCE-${{ steps.version.outputs.VERSION }}-windows.zip
          retention-days: 30     # Dev builds kept for 30 days

      # ── 12. Create GitHub Release (only for version tags) ─────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "HBCE ${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
          body: |
            ## HBCE — Hybrid Controls Editor ${{ steps.version.outputs.VERSION }}

            ### Download
            **⬇️ Download:** `HBCE-${{ steps.version.outputs.VERSION }}-windows.zip`

            ### How to install
            1. Download the zip below
            2. Extract the folder anywhere on your PC
            3. Double-click `HBCE.exe`
            4. No installation or Python required

            ### Requirements
            - Windows 10 or Windows 11 (64-bit)

            ### What's new
            See [CHANGELOG.md](https://github.com/Munchi-z/HBC-Editor/blob/main/CHANGELOG.md) for details.

            ---
            Built automatically by GitHub Actions · Commit `${{ github.sha }}`
          files: |
            HBCE-${{ steps.version.outputs.VERSION }}-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
