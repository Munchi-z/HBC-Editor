# HBCE — Hybrid Controls Editor
# .github/workflows/build.yml  (v5 — V0.1.2a-alpha)
#
# ALL FIXES APPLIED (FIX-001 through FIX-006):
#   FIX-001: shell: python replaced with script file approach
#   FIX-002: BAC0/google pip installs made non-fatal (warn + continue)
#   FIX-003: Removed missing version_info.txt from PyInstaller spec
#   FIX-004: Bash heredocs replaced with PowerShell here-strings
#   FIX-005: Node.js deprecation warning — informational only
#   FIX-006: Added permissions: contents: write (required for Releases)
#
# HOW TO TRIGGER:
#   Tag release:  git tag v0.1.2a-alpha && git push origin v0.1.2a-alpha
#   Manual:       GitHub → Actions → "Build HBCE Windows Executable" → Run workflow
#
# OUTPUT:
#   HBCE-v0.1.2a-alpha-windows.zip  — contains HBCE.exe + all deps (portable, no install)
#   Also uploaded as a GitHub Release asset on tag pushes.

name: Build HBCE Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version label (e.g. v0.1.2a-alpha). Leave blank for auto.'
        required: false
        default: ''

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    # ── FIX-006: Explicit permissions — required to create Releases ────────
    permissions:
      contents: write    # Create releases + upload assets
      actions: read      # Read workflow run info

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so git log works correctly

      # ── 2. Python 3.11 ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      # ── 3. Upgrade pip ────────────────────────────────────────────────────
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # ── 4. Core packages (must succeed) ───────────────────────────────────
      - name: Install core packages
        run: |
          pip install PyQt6
          pip install pyqtgraph
          pip install numpy
          pip install cryptography
          pip install requests
          pip install reportlab
          pip install openpyxl
          pip install pyserial
          pip install psutil
          pip install pyinstaller

      # ── 5. Optional comms packages (allowed to fail) ──────────────────────
      - name: Install optional packages
        shell: pwsh
        run: |
          $pkgs = @("BAC0","pymodbus","google-api-python-client",
                    "google-auth-httplib2","google-auth-oauthlib","msal")
          foreach ($p in $pkgs) {
            Write-Host "Trying: $p"
            pip install $p 2>&1 | Out-Null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "  SKIP: $p failed (non-fatal)"
            } else {
              Write-Host "  OK: $p"
            }
          }
          exit 0

      # ── 6. Determine version ──────────────────────────────────────────────
      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ref   = "${{ github.ref }}"
          $input = "${{ github.event.inputs.version_override }}"
          if ($ref -match "refs/tags/(.+)") {
            $ver = $matches[1]
          } elseif ($input -ne "") {
            $ver = $input
          } else {
            $short = git rev-parse --short HEAD
            $ver = "dev-$short"
          }
          Write-Host "Version: $ver"
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── 7. Create asset placeholders (FIX-001) ────────────────────────────
      - name: Write asset setup script
        shell: pwsh
        run: |
          @'
          import os, struct
          os.makedirs("assets/icons", exist_ok=True)
          os.makedirs("assets/themes", exist_ok=True)
          ico = "assets/icons/hbce_icon.ico"
          if not os.path.exists(ico):
              data  = b"\x00\x00\x01\x00\x01\x00"
              data += bytes([16,16,0,0,1,0,32,0])
              data += struct.pack("<I", 40+16*16*4)
              data += struct.pack("<I", 22)
              data += struct.pack("<IIIHHIIIIII",40,16,32,1,32,0,16*16*4,0,0,0,0)
              data += b"\x00\x00\x00\x00"*(16*16)
              open(ico,"wb").write(data)
              print("Created placeholder icon")
          for t in ["dark_default.qss","light_default.qss"]:
              p = f"assets/themes/{t}"
              if not os.path.exists(p):
                  open(p,"w").write("/* HBCE placeholder */\n")
                  print(f"Created {p}")
          print("Assets OK")
          '@ | Out-File -FilePath setup_assets.py -Encoding utf8

      - name: Run asset setup
        run: python setup_assets.py

      # ── 8. Write CI PyInstaller spec (FIX-003) ────────────────────────────
      - name: Write PyInstaller spec
        shell: pwsh
        run: |
          @'
          block_cipher = None
          a = Analysis(
              ["main.py"],
              pathex=["."],
              binaries=[],
              datas=[
                  ("assets/icons",  "assets/icons"),
                  ("assets/themes", "assets/themes"),
              ],
              hiddenimports=[
                  "PyQt6.sip",
                  "PyQt6.QtPrintSupport",
                  "cryptography",
                  "cryptography.fernet",
                  "requests",
                  "serial",
                  "serial.tools",
                  "serial.tools.list_ports",
                  "reportlab",
                  "openpyxl",
                  "pyqtgraph",
                  "numpy",
                  "psutil",
              ],
              hookspath=[],
              runtime_hooks=[],
              excludes=["tkinter","matplotlib","scipy","cv2","IPython"],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=block_cipher,
              noarchive=False,
          )
          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
          exe = EXE(
              pyz, a.scripts, [],
              exclude_binaries=True,
              name="HBCE",
              debug=False,
              strip=False,
              upx=True,
              console=False,
              icon="assets/icons/hbce_icon.ico",
          )
          coll = COLLECT(
              exe, a.binaries, a.zipfiles, a.datas,
              strip=False, upx=True, upx_exclude=[], name="HBCE",
          )
          '@ | Out-File -FilePath hbce_ci.spec -Encoding utf8
          Write-Host "CI spec written."

      # ── 9. Build .exe ─────────────────────────────────────────────────────
      - name: Build with PyInstaller
        shell: pwsh
        run: pyinstaller hbce_ci.spec --clean --noconfirm
        env:
          HBCE_LICENSE_ENABLED: "0"

      # ── 10. Verify .exe exists ────────────────────────────────────────────
      - name: Verify build
        shell: pwsh
        run: |
          if (Test-Path "dist\HBCE\HBCE.exe") {
            $mb = (Get-Item "dist\HBCE\HBCE.exe").Length/1MB
            Write-Host ("Build OK — HBCE.exe ({0:N1} MB)" -f $mb)
          } else {
            Write-Host "ERROR: HBCE.exe missing"
            Get-ChildItem dist\ -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }

      # ── 11. Write info files (FIX-004) ────────────────────────────────────
      - name: Write build info
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.VERSION }}"
          $date = Get-Date -Format "yyyy-MM-dd HH:mm UTC"
          $sha  = "${{ github.sha }}"

          "HBCE - Hybrid Controls Editor`r`nVersion : $ver`r`nBuilt   : $date`r`nCommit  : $sha`r`nRepo    : https://github.com/Munchi-z/HBC-Editor" `
            | Out-File "dist\HBCE\BUILD_INFO.txt" -Encoding utf8

          "HBCE $ver`r`n`r`nHOW TO RUN:`r`n  1. Extract this zip anywhere`r`n  2. Double-click HBCE.exe`r`n  No install or Python needed.`r`n`r`nDefault login: admin`r`nRequires: Windows 10 or 11 (64-bit)`r`nSupport: https://github.com/Munchi-z/HBC-Editor" `
            | Out-File "dist\HBCE\HOW_TO_RUN.txt" -Encoding utf8

          Write-Host "Info files written."

      # ── 12. Zip the HBCE folder (HBCE.exe + all deps inside) ──────────────
      - name: Zip build output
        id: zip
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $zip = "HBCE-$ver-windows.zip"

          # Zip the contents of dist\HBCE\ so extracting gives HBCE\ folder
          # with HBCE.exe at the top level inside it — no double-nesting
          Push-Location "dist"
          Compress-Archive -Path "HBCE" -DestinationPath "..\$zip" -Force
          Pop-Location

          $mb = (Get-Item $zip).Length/1MB
          Write-Host ("Zipped: $zip ({0:N1} MB)" -f $mb)
          "ZIP_NAME=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── 13. Sanity check: confirm HBCE.exe is inside the zip ──────────────
      - name: Verify zip contents
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $zip = "HBCE-$ver-windows.zip"
          $entries = (Get-Item $zip | Select-Object -ExpandProperty FullName |
            ForEach-Object { Add-Type -Assembly System.IO.Compression.FileSystem;
              [IO.Compression.ZipFile]::OpenRead($_).Entries.FullName })
          $hasExe = $entries | Where-Object { $_ -like "*HBCE.exe" }
          if ($hasExe) {
            Write-Host "ZIP OK — HBCE.exe confirmed inside zip"
          } else {
            Write-Host "WARNING: HBCE.exe not found in zip root — listing entries:"
            $entries | Select-Object -First 20 | ForEach-Object { Write-Host "  $_" }
          }

      # ── 14. Upload artifact (always — so manual runs can download too) ────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HBCE-${{ steps.version.outputs.VERSION }}-windows
          path: HBCE-${{ steps.version.outputs.VERSION }}-windows.zip
          retention-days: 30

      # ── 15. Create GitHub Release (tag pushes only) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "HBCE ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
          body: |
            ## HBCE — Hybrid Controls Editor ${{ steps.version.outputs.VERSION }}

            ### 📦 How to install
            1. Download **`HBCE-${{ steps.version.outputs.VERSION }}-windows.zip`** below
            2. Extract the zip — you'll get an **`HBCE\`** folder
            3. Open that folder and double-click **`HBCE.exe`**
            4. No install or Python needed — fully portable

            **Requires:** Windows 10 or 11 (64-bit)
            **Default login:** `admin`

            ---
            ### 🆕 What's new in this release
            - Backup / Restore panel — full implementation (1,762 lines)
            - ARCH-011 restore flow: diff preview → typed confirmation → pre-restore auto-backup → restore
            - Diff viewer with colour-coded unified diff
            - Auto-backup on device connect, retention policy, import/export .hbce-bak files

            ---
            Built by GitHub Actions · Commit `${{ github.sha }}`
          files: HBCE-${{ steps.version.outputs.VERSION }}-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
